name: Deploy Personal Site

on:
  workflow_run:
    workflows: ["Container Build & Push"]
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      tag:
        description: "Container image tag to deploy"
        required: false
        default: "latest"
        type: string

jobs:
  deploy:
    runs-on: personal-site-runner
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: "latest"

      - name: Update deployment and reroll
        run: |
          TAG="${{ inputs.tag || 'latest' }}"
          echo "Updating deployment image to ghcr.io/josephaw1022/personalwebsite:$TAG..."
          kubectl set image deployment/personal-site personalwebsite=ghcr.io/josephaw1022/personalwebsite:$TAG -n personal-site

          echo "Triggering rollout restart for personal-site deployment..."
          kubectl rollout restart deployment/personal-site -n personal-site

          echo "Waiting for rollout to complete..."
          kubectl rollout status deployment/personal-site -n personal-site
